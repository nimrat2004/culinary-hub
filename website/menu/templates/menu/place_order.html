{% extends 'base.html' %}

{% block title %}Place Order{% endblock %}

{% block extra_css %}
<style>
  .container {
    max-width: 600px;
    margin: 40px auto;
    background-color: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
  }

  h2 {
    font-size: 28px;
    font-weight: 600;
    color: #333;
    margin-bottom: 20px;
    text-align: center;
  }

  form p {
    font-size: 16px;
    margin-bottom: 15px;
  }

  input[type="text"],
  input[type="email"],
  input[type="number"],
  textarea,
  select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
    transition: border 0.3s ease;
  }

  input:focus,
  textarea:focus,
  select:focus {
    border-color: #45b6fe;
    outline: none;
  }

  .btn-success {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background-color: #28a745;
    border: none;
    border-radius: 10px;
    color: white;
    transition: background-color 0.3s ease;
  }

  .btn-success:hover {
    background-color: #218838;
  }

  p strong {
    font-size: 18px;
    color: #222;
  }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Place Your Order</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <p><strong>Total Amount:</strong> ₹{{ total }}</p>
    <button type="submit" class="btn btn-success">Confirm Order</button>
  </form>
</div>
{% endblock %}

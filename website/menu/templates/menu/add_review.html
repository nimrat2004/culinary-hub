{% extends 'base.html' %}
{% block title %}Add Review{% endblock %}
{% block content %}
<div class="container mt-4">
  <h3>Review for: {{ item.name }}</h3>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Submit Review</button>
    <a href="{% url 'menu:index' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
